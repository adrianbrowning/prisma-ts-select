name: v6-mysql
on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node: [22.x, 24.x]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: prisma_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -ptest"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}

      - name: Build prisma-ts-select
        run: pnpm --filter prisma-ts-select build

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -ptest --silent; then
              echo "MySQL ready"
              exit 0
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          exit 1

      - name: Generate Prisma client
        run: pnpm --filter usage-mysql-v6 gen

      - name: Reset database
        run: pnpm --filter usage-mysql-v6 p:r

      - name: TypeScript check
        run: pnpm --filter usage-mysql-v6 lint:ts

      - name: Run tests
        run: pnpm --filter usage-mysql-v6 test
