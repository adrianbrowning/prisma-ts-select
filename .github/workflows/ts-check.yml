name: TS Check

on:
  pull_request:
    branches:
      - main
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tscheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup
        with:
          checkout-ref: ${{ github.head_ref || github.ref_name }}

      - name: Run TypeScript Check
        id: ts-check
        continue-on-error: true
        run: |
          set +e
          set -o pipefail
          pnpm run lint:ts 2>&1 | tee ts-check-output.txt
          TS_EXIT_CODE=$?
          echo "exit_code=$TS_EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $TS_EXIT_CODE -ne 0 ]; then
            echo "TypeScript checks failed. TS_EXIT_CODE=$TS_EXIT_CODE"
            exit 1
          fi

      - name: Comment TS check results on PR
        if: github.event_name == 'pull_request' && steps.ts-check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('ts-check-output.txt', 'utf8');
            const comment = `## ❌ TypeScript Check Failed

            <details>
            <summary>Click to see type errors</summary>

            \`\`\`
            ${output}
            \`\`\`

            </details>

            [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

      - name: Fail if TS check failed
        if: steps.ts-check.outputs.exit_code != '0'
        run: exit 1
