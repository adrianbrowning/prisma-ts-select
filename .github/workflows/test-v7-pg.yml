name: v7-postgresql
on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node: [22.x, 24.x]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: prisma_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}

      - name: Build prisma-ts-select
        run: pnpm --filter prisma-ts-select build

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres; then
              echo "PostgreSQL ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          exit 1

      - name: Generate Prisma client
        run: pnpm --filter usage-pg-v7 gen

      - name: Reset database
        run: pnpm --filter usage-pg-v7 p:r

      - name: TypeScript check
        run: pnpm --filter usage-pg-v7 lint:ts

      - name: Run tests
        run: pnpm --filter usage-pg-v7 test
