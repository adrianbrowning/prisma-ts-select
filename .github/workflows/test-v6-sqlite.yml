name: v6-sqlite
on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node: [22.x, 24.x]
    steps:
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}

      - name: Build prisma-ts-select
        run: pnpm --filter prisma-ts-select build

      - name: Generate Prisma client
        run: pnpm --filter usage-sqlite-v6 gen

      - name: Reset database
        run: pnpm --filter usage-sqlite-v6 p:r

      - name: TypeScript check
        run: pnpm --filter usage-sqlite-v6 lint:ts

      - name: Run tests
        run: pnpm --filter usage-sqlite-v6 test
