name: Knip

on:
  pull_request:
    branches:
      - main
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  knip:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup
        with:
          checkout-ref: ${{ github.head_ref || github.ref_name }}

      - name: Run knip
        id: knip-check
        continue-on-error: true
        run: |
          set +e
          set -o pipefail
          pnpm knip 2>&1 | tee knip-output.txt
          KNIP_EXIT_CODE=$?
          echo "exit_code=$KNIP_EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $KNIP_EXIT_CODE -ne 0 ]; then
            echo "Knip checks failed. KNIP_EXIT_CODE=$KNIP_EXIT_CODE"
            exit 1
          fi

      - name: Comment knip results on PR
        if: github.event_name == 'pull_request' && steps.knip-check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('knip-output.txt', 'utf8');
            const comment = `## 🔍 Knip Check Failed

            <details>
            <summary>Click to see knip errors</summary>

            \`\`\`
            ${output}
            \`\`\`

            </details>

            [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

      - name: Fail if knip failed
        if: steps.knip-check.outputs.exit_code != '0'
        run: exit 1
