name: Setup
description: Checkout, install pnpm + Node.js, cache pnpm store, install dependencies

inputs:
  node-version:
    description: Node.js version
    default: '24'
  checkout-ref:
    description: Git ref to checkout (e.g. github.head_ref for PRs)
    default: ''
  checkout-fetch-depth:
    description: Fetch depth for checkout
    default: '1'

runs:
  using: composite
  steps:
    - name: Check if commit is made by bot
      if: github.actor == 'github-actions[bot]'
      shell: bash
      run: echo "Commit made by bot. Exiting workflow." && exit 0

    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        token: ${{ github.token }}
        fetch-depth: ${{ inputs.checkout-fetch-depth }}
        ref: ${{ inputs.checkout-ref }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Get pnpm store path
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
